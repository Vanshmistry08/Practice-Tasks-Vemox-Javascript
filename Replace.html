<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Replace() JS</title>
</head>
<body>

    <h1>Javascript String</h1>
    <h2>The Replace() Method</h2>

<P>The New string</P>
<p id="demo"></p>

<script>
let text = "Hello, World!";
document.getElementById("demo").innerHTML =
text.replace("World", "Javascript");
</script>


</body>
</html>
