<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function</title>
</head>
<body>
    

    <p id="demo"></p>

    <script>
        const myfunction = (p1,p2) => p1 * p2;
        let result = myfunction(20,50);
        document.getElementById("demo").innerHTML = result
    </script>
</body>
</html>
