<!DOCTYPE html>
<html lang="en">
<head>
      <title>Document</title>
</head>
<body>

    <h1>Javascript Variables</h1>

    <p>In this example, x, y, and z are variables.</p>

    <p id="demo"></p>

    <script>
        const x = 5;
        const y = 6;
        const z = x + y;
        document.getElementById("demo").innerHTML = z;
    </script>
    
</body>
</html>
