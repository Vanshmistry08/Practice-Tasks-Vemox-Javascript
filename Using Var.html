<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Var</title>
</head>
<body>

    <h1>Automatically Variables</h1>

    <p>In This Example We Are Using var</p>

    <p id="demo"></p>

    <script>
        var x = 5;
        var y = 6;
        var z = x + y;
        document.getElementById("demo").innerHTML = z;
    </script>
    
</body>
</html>
