<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript SUBSTR()</title>
</head>
<body>

<h1>Javascript Substring</h1>
<h2>The Substr() Method</h2>

<P>The Extracted part of the string is:</P>
<p id="demo"></p>

<script>
let text =  "Hello, World!";
document.getElementById("demo").innerHTML = text.substr(7, 12);
</script>
       
      
</body>
